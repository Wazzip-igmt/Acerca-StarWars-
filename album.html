<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum - Star Wars</title>

    <style>
        body {
    margin: 0;
    background-image: url("imagens/fundo.jpg");
    background-size: cover;
    background-position: center;
    color: white;
}

        .logo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;

            filter: drop-shadow(0 0 5px #FFE81F)
          drop-shadow(0 0 10px #FFE81F)
          drop-shadow(0 0 20px #FFE81F);
        }
        .galeria {
    margin-top: 120px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background-color: rgba(0, 0, 0, 0.7);
    border-radius: 12px;
    overflow: hidden;
    text-align: center;
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card h3 {
    color: #FFE81F;
    padding: 10px;
}

a {
    text-decoration: none;
    color: inherit;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #FFE81F;
}

.voltar {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #FFE81F;
    text-decoration: none;
    border: 1px solid #FFE81F;
    padding: 8px 15px;
    border-radius: 8px;
}

.voltar:hover {
    background-color: #FFE81F;
    color: black;
}
    </style>
</head>

<body>
