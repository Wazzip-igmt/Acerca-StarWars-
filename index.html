<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Star Wars - Álbum</title>

  <!-- Fonte estilo sci-fi -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url("imagens/fundo.jpg");
      background-size: cover;
      background-position: center;
      font-family: 'Orbitron', sans-serif;
      color: yellow;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .conteudo {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .botao {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background-color: black;
      color: yellow;
      border: 2px solid yellow;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: yellow;
      color: black;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="conteudo">
    <h1>Star Wars</h1>

    <p>
      Em uma galáxia muito, muito distante, a luta entre o bem e o mal
      marca gerações. Jedi e Sith travam batalhas épicas enquanto a
      Força guia o destino de heróis e vilões.<br>
      <br>
      conheça aqui alguns personagens:
    </p>

    <a href="album.html" class="botao">Acessar Álbum</a>
  </div>

</body>
</html>
